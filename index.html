<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Application</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
  --bg-color: #eef2f7;
  --card-color: #ffffff;
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --correct: #16a34a;
  --wrong: #dc2626;
  --text-color: #1f2937;
  --border-color: #d1d5db;
  --option-hover-bg: #4f46e5;
  --option-hover-color: #ffffff;
}
.dark-theme {
  --bg-color: #0f172a;
  --card-color: #1e293b;
  --primary: #6366f1;
  --primary-hover: #4f46e5;
  --correct: #22c55e;
  --wrong: #ef4444;
  --text-color: #f8fafc;
  --border-color: #334155;
  --option-hover-bg: #6366f1;
  --option-hover-color: #ffffff;
}
body {
  background: var(--bg-color);
  color: var(--text-color);
  font-family: 'Segoe UI', sans-serif;
  transition: 0.4s ease;
}
.quiz-card {
  max-width: 750px;
  margin: auto;
  background: var(--card-color);
  border-radius: 18px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  padding: 20px;
}
.dark-theme .quiz-card {
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}
.option-btn {
  width: 100%;
  margin-bottom: 12px;
  padding: 12px;
  text-align: left;
  border-radius: 10px;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-color);
  cursor: pointer;
  transition: all 0.3s ease;
}
.option-btn:hover {
  background: var(--option-hover-bg);
  color: var(--option-hover-color);
  transform: translateY(-2px);
}
.option-btn:active {
  transform: scale(0.95);
}
.dark-theme .option-btn {
  background: #020617;
  color: #f8fafc;
  border: 1px solid #334155;
}
.dark-theme .option-btn:hover {
  background: #6366f1;
  color: #ffffff;
}
.dark-theme #questionText {
  color: #f8fafc;
}
.dark-theme .table {
  background: #1e293b;
  color: #f8fafc;
}
.dark-theme .table th {
  background: #334155;
}
.dark-theme .table td,
.dark-theme .table th {
  border-color: #475569;
}
.correct {
  background: var(--correct) !important;
  color: white !important;
}
.wrong {
  background: var(--wrong) !important;
  color: white !important;
}
.btn-primary {
  background: var(--primary);
  border: none;
}
.btn-primary:hover {
  background: var(--primary-hover);
}
.segment {
  height: 8px;
  border-radius: 20px;
}
.timer {
  font-weight: bold;
  color: var(--wrong);
}
</style>
</head>
<body>
<div class="container py-5">
<div class="card quiz-card">
<div id="startScreen" class="text-center">
  <h3>Quiz Application 🎯</h3>
  <p>Test your knowledge with a timed quiz!</p>
  <button class="btn btn-primary mt-3" onclick="startQuiz()">Start Quiz</button>
</div>
<div id="quizContent" class="d-none">
<div class="d-flex justify-content-between align-items-center mb-3">
<h4>Quiz Application</h4>
<div>
<button class="btn btn-light btn-sm me-2" onclick="setLight()">☀ Light</button>
<button class="btn btn-dark btn-sm" onclick="setDark()">🌙 Dark</button>
</div>
</div>
<div id="progressBar" class="d-flex gap-2 mb-3"></div>
<div class="d-flex justify-content-between mb-2">
<p id="questionCount"></p>
<p class="timer">Time Left: <span id="time">15</span>s</p>
</div>
<h5 id="questionText"></h5>
<div id="optionsContainer" class="mt-3"></div>
<div class="text-center">
  <button id="nextBtn" class="btn btn-primary mt-3 d-none" onclick="nextQuestion()">Next →</button>
</div>
<div id="resultSection" class="mt-4 d-none">
<h4>Quiz Result</h4>
<p id="finalScore"></p>
<div id="resultTable"></div>
<button class="btn btn-success mt-3" onclick="downloadPDF()">Download PDF</button>
<button class="btn btn-secondary mt-2" onclick="location.reload()">Restart Quiz</button>
</div>
</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
const questions = [
{question: "Which tag creates a hyperlink in HTML?", options: ["<a>", "<link>", "<href>", "<p>"], answer: "<a>"},
{question: "Which CSS property changes text color?", options: ["font-style", "color", "background", "text-align"], answer: "color"},
{question: "Which JavaScript keyword declares block-scoped variable?", options: ["var", "let", "int", "define"], answer: "let"},
{question: "Bootstrap is mainly used for?", options: ["Database", "Responsive Design", "Compiler", "Backend"], answer: "Responsive Design"},
{question: "Which JavaScript function shows alert box?", options: ["console.log()", "alert()", "print()", "show()"], answer: "alert()"}
];
let shuffledQuestions = [...questions].sort(() => Math.random() - 0.5);
let currentIndex = 0;
let score = 0;
let timer;
let timeLeft = 15;
let userAnswers = [];
function startQuiz() {
  document.getElementById("startScreen").classList.add("d-none");
  document.getElementById("quizContent").classList.remove("d-none");
  loadQuestion();
}
function loadQuestion() {
  clearInterval(timer);
  timeLeft = 15;
  document.getElementById("time").innerText = timeLeft;
  startTimer();
  const current = shuffledQuestions[currentIndex];
  document.getElementById("questionText").innerText = current.question;
  document.getElementById("questionCount").innerText = `Question ${currentIndex + 1} / ${shuffledQuestions.length}`;
  const optionsContainer = document.getElementById("optionsContainer");
  optionsContainer.innerHTML = "";
  current.options.forEach(option => {
    let btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerText = option;
    btn.onclick = () => selectAnswer(btn, option);
    optionsContainer.appendChild(btn);
  });
  updateProgressBar();
}
function startTimer() {
  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timer);
      const correct = shuffledQuestions[currentIndex].answer;
      document.querySelectorAll(".option-btn").forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === correct) btn.classList.add("correct");
      });
      userAnswers.push({
        question: shuffledQuestions[currentIndex].question,
        selected: "Not Answered",
        correct: correct
      });

      document.getElementById("nextBtn").classList.remove("d-none");
    }
  }, 1000);
}
function selectAnswer(button, selected) {
  if (document.querySelector(".option-btn:disabled")) return;
  clearInterval(timer);
  const correct = shuffledQuestions[currentIndex].answer;
  document.querySelectorAll(".option-btn").forEach(btn => {
    btn.disabled = true;
    if (btn.innerText === correct) btn.classList.add("correct");
    if (btn.innerText === selected && selected !== correct) btn.classList.add("wrong");
  });
  userAnswers.push({
    question: shuffledQuestions[currentIndex].question,
    selected: selected,
    correct: correct
  });
  if (selected === correct) score++;

  document.getElementById("nextBtn").classList.remove("d-none");
}
function nextQuestion() {
  document.getElementById("nextBtn").classList.add("d-none");
  currentIndex++;
  if (currentIndex < shuffledQuestions.length) loadQuestion();
  else showResults();
}
function updateProgressBar() {
  const progressBar = document.getElementById("progressBar");
  progressBar.innerHTML = "";
  const colors = ["#4f46e5", "#22c55e", "#f59e0b", "#ef4444", "#06b6d4"];
  for (let i = 0; i < shuffledQuestions.length; i++) {
    let div = document.createElement("div");
    div.className = "flex-fill segment";
    div.style.backgroundColor = i <= currentIndex ? colors[i % colors.length] : "#cbd5e1";
    progressBar.appendChild(div);
  }
}
function showResults() {
  document.getElementById("questionText").classList.add("d-none");
  document.getElementById("optionsContainer").classList.add("d-none");
  document.getElementById("nextBtn").classList.add("d-none");
  document.getElementById("progressBar").classList.add("d-none");
  document.querySelector(".timer").classList.add("d-none");
  document.getElementById("resultSection").classList.remove("d-none");
  document.getElementById("finalScore").innerText = `Your Score: ${score} / ${shuffledQuestions.length}`;
  let table = `<table class="table table-bordered mt-3">
  <tr><th>#</th><th>Question</th><th>Your Answer</th><th>Correct</th><th>Status</th></tr>`;
  userAnswers.forEach((item, index) => {
    table += `<tr>
      <td>${index + 1}</td>
      <td>${item.question}</td>
      <td>${item.selected}</td>
      <td>${item.correct}</td>
      <td>${item.selected === item.correct ? '<span class="text-success">Correct</span>' : '<span class="text-danger">Incorrect</span>'}</td>
    </tr>`;
  });
  table += "</table>";
  document.getElementById("resultTable").innerHTML = table;
}
function setDark() { document.body.classList.add("dark-theme"); }
function setLight() { document.body.classList.remove("dark-theme"); }
function downloadPDF() {
  const element = document.getElementById("resultSection");
  html2pdf().from(element).save("Web_Technologies_Quiz_Result.pdf");
}
</script>
</body>
</html>
